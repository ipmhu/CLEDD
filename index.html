<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLED Test Menú</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; }
    .header {
      position: fixed; top:0; left:0; right:0; background: #0A3D91; color: white;
      padding: 1rem; display: flex; justify-content: space-between; align-items: center;
      z-index: 100;
    }
    .logo { font-size: 1.5rem; font-weight: bold; }
    .menu-btn {
      background: none; border: 2px solid white; color: white; font-size: 2rem;
      cursor: pointer; padding: 0.25rem 0.75rem; border-radius: 8px;
    }
    .menu-overlay {
      position: fixed; top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.9); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .menu-overlay.open { opacity: 1; pointer-events: auto; }
    .menu-overlay nav { text-align: center; }
    .menu-overlay a {
      display: block; color: white; font-size: 2rem; margin: 1rem 0;
      text-decoration: none;
    }
    .menu-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: white; font-size: 3rem; cursor: pointer;
    }
    .hero { min-height: 100vh; background: linear-gradient(135deg, #0A3D91, #02111D); color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">CLED</div>
    <button class="menu-btn" id="menuBtn">☰</button>
  </header>

  <div class="menu-overlay" id="menuOverlay">
    <button class="menu-close" id="menuClose">&times;</button>
    <nav>
      <a href="#">Nosotros</a>
      <a href="#">Clubes</a>
      <a href="#">Eventos</a>
    </nav>
  </div>

  <section class="hero">
    <h1>CLED – Club de Liderazgo</h1>
  </section>

  <script>
    // Menú
    document.getElementById('menuBtn').addEventListener('click', function() {
      document.getElementById('menuOverlay').classList.add('open');
    });
    document.getElementById('menuClose').addEventListener('click', function() {
      document.getElementById('menuOverlay').classList.remove('open');
    });
    // Cerrar al hacer clic en un enlace
    var links = document.querySelectorAll('.menu-overlay a');
    for (var i = 0; i < links.length; i++) {
      links[i].addEventListener('click', function() {
        document.getElementById('menuOverlay').classList.remove('open');
      });
    }
  </script>
</body>
</html>
