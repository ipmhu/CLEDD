<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CLED – Clubes">
    <meta name="theme-color" content="#0A3D91">
    <link rel="icon" type="image/png" href="LOGO_CLED_SF.png">
    <title>CLED – Clubes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============ VARIABLES Y TEMAS ============ */
        :root {
            --bg: #FFFFFF;
            --bg-alt: #F8FAFC;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --card-bg: #FFFFFF;
            --header-bg: rgba(255,255,255,0.92);
            --shadow: 0 4px 6px rgba(0,0,0,0.03);
            --shadow-hover: 0 12px 28px rgba(0,0,0,0.08);
            --primary: #0A3D91;
            --primary-hover: #062757;
            --gold: #D4AF37;
            --gold-hover: #b8960f;
            --transition-speed: 0.25s;
        }

        .dark {
            --bg: #0F172A;
            --bg-alt: #1E293B;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --border: #334155;
            --card-bg: #1E293B;
            --header-bg: rgba(15,23,42,0.92);
            --shadow: 0 4px 6px rgba(0,0,0,0.15);
            --shadow-hover: 0 12px 28px rgba(0,0,0,0.25);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background var(--transition-speed), color var(--transition-speed);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }

        /* ============ HEADER ============ */
        .main-header {
            position: fixed; top:0; left:0; right:0; z-index:100; padding:1rem 0;
            background: var(--header-bg); backdrop-filter:blur(14px);
            border-bottom: 1px solid var(--border);
            transition: all var(--transition-speed);
        }
        .header-inner {
            display:flex; align-items:center; justify-content:space-between;
            max-width:1200px; margin:0 auto; padding:0 1.5rem;
        }
        .logo { display:flex; align-items:center; gap:0.75rem; }
        .logo img { height:56px; transition: transform 0.3s; }
        .logo img:hover { transform: scale(1.05); }
        .logo span {
            font-weight:800; font-size:1.8rem; color:var(--primary);
            font-family:'Montserrat',sans-serif; letter-spacing: -0.5px;
        }
        .menu-btn {
            background:none; border:none; font-size:2rem; cursor:pointer;
            color:var(--primary); transition: transform 0.2s;
        }
        .menu-btn:hover { transform: rotate(90deg); }

        /* ============ BOTONES ============ */
        .btn {
            display:inline-flex; align-items:center; gap:0.5rem;
            padding:0.8rem 2rem; border-radius:9999px; font-weight:600;
            cursor:pointer; border:none; text-decoration:none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size:0.95rem;
        }
        .btn-primary { background:var(--primary); color:white; }
        .btn-primary:hover { background:var(--primary-hover); transform:translateY(-2px); box-shadow:0 8px 20px rgba(10,61,145,0.3); }
        .btn-outline { background:transparent; border:2px solid var(--border); color:var(--text); }
        .btn-outline:hover { background:var(--border); transform:translateY(-2px); }
        .btn-gold { background:var(--gold); color:#1e293b; }
        .btn-gold:hover { background:var(--gold-hover); transform:translateY(-2px); box-shadow:0 8px 20px rgba(212,175,55,0.4); }

        .theme-toggle {
            background:none; border:2px solid var(--border); color:var(--text);
            padding:0.5rem 1rem; border-radius:9999px; cursor:pointer;
            font-size:1.2rem; transition: all 0.3s;
        }
        .theme-toggle:hover { background:var(--border); }

        /* ============ MENÚ LATERAL DERECHO ============ */
        .menu-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.35);
            z-index: 199; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .menu-backdrop.open { opacity: 1; pointer-events: auto; }

        .menu-overlay {
            position: fixed; top: 0; right: 0; bottom: 0; z-index: 200;
            width: 320px; max-width: 80vw;
            background: rgba(10,61,145,0.97);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 2rem 1.5rem;
        }
        .menu-overlay.open { transform: translateX(0); }

        .menu-container { width: 100%; text-align: center; }

        .menu-overlay nav { display: flex; flex-direction: column; gap: 1.2rem; }

        .menu-overlay a {
            color: white; font-size: 1.3rem;
            font-weight: 700; font-family: 'Montserrat', sans-serif;
            transition: color 0.2s, transform 0.2s;
            padding: 0.5rem 0;
            text-decoration: none;
        }
        .menu-overlay a:hover { color: var(--gold); transform: scale(1.05); }

        .menu-close {
            position: absolute; top: 1rem; right: 1.5rem;
            background: none; border: none; font-size: 2rem; color: white;
            cursor: pointer; transition: transform 0.3s;
        }
        .menu-close:hover { transform: rotate(90deg); }

        /* ============ HERO ============ */
        .hero {
            min-height: 40vh; display:flex; align-items:center;
            background:linear-gradient(135deg, #0A3D91 0%, #02111D 100%);
            color:white; position:relative; overflow:hidden;
        }
        .hero h1 { font-size: clamp(2.5rem, 6vw, 4rem); }

        /* ============ SECCIONES ============ */
        .section { padding:5rem 0; }
        .section-title {
            font-size:2.2rem; font-weight:800; margin-bottom:1.5rem;
            color:var(--primary); transition: color 0.3s;
        }
        .card {
            background:var(--card-bg); border-radius:20px; padding:2rem;
            box-shadow:var(--shadow); border:1px solid var(--border);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-align:center;
        }
        .card:hover { transform:translateY(-8px); box-shadow:var(--shadow-hover); }

        .grid-3 { display:grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap:2rem; }

        .club-emoji { font-size:3.5rem; margin-bottom:0.75rem; transition: transform 0.3s; }
        .card:hover .club-emoji { transform: scale(1.1); }

        /* ============ MODAL ============ */
        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px);
            display:flex; align-items:center; justify-content:center; z-index:1000;
            opacity:0; pointer-events:none; transition:opacity 0.35s;
        }
        .modal-overlay.open { opacity:1; pointer-events:auto; }
        .modal-content {
            background:var(--card-bg); border-radius:24px; max-width:600px;
            width:92%; max-height:85vh; overflow-y:auto; padding:2.5rem;
            position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.15);
            transform: scale(0.95); transition: transform 0.3s;
        }
        .modal-overlay.open .modal-content { transform: scale(1); }
        .modal-close {
            position:absolute; top:1.2rem; right:1.5rem; background:none;
            border:none; font-size:2rem; cursor:pointer; color:var(--text);
            transition: transform 0.2s;
        }
        .modal-close:hover { transform: rotate(90deg); }

        .facilitador-foto {
            width:120px; height:120px; border-radius:50%; object-fit:cover;
            border: 3px solid var(--primary); margin:0.5rem 0;
        }

        @media (max-width:768px) {
            .menu-overlay { width: 280px; }
            .menu-overlay a { font-size: 1.2rem; }
            .logo img { height:44px; }
            .logo span { font-size:1.4rem; }
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-inner">
            <div class="logo">
                <img src="LOGO_CLED.png" alt="CLED Logo">
                <span>CLED</span>
            </div>
            <div style="display:flex; align-items:center; gap:1rem;">
                <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌓</button>
                <a href="login.html" class="btn btn-primary">Campus CLED</a>
                <button class="menu-btn" id="menuBtn" aria-label="Abrir menú">☰</button>
            </div>
        </div>
    </header>

    <div class="menu-backdrop" id="menuBackdrop"></div>
    <div class="menu-overlay" id="menuOverlay">
        <button class="menu-close" id="menuClose">&times;</button>
        <div class="menu-container">
            <nav>
                <a href="index.html">Inicio</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="clubes.html">Clubes</a>
                <a href="eventos.html">Eventos</a>
                <a href="noticias.html">Noticias</a>
                <a href="galeria.html">Galería</a>
                <a href="impacto.html">Impacto</a>
                <a href="documentos.html">Documentos</a>
                <a href="validar.html">Validar Certificado</a>
                <a href="contacto.html">Contacto</a>
                <a href="faq.html">FAQ</a>
            </nav>
        </div>
    </div>

    <section class="hero">
        <div class="container" style="padding-top:4rem;">
            <h1>Clubes</h1>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="grid-3" id="clubesContainer"></div>
        </div>
    </section>

    <footer style="background:#0F172A; color:white; padding:2rem 0; text-align:center;">
        <div class="container">
            <p>© 2026 CLED. Todos los derechos reservados.</p>
            <p><a href="index.html" style="color:var(--gold);">Volver al inicio</a></p>
        </div>
    </footer>

    <!-- Modal para detalles del club -->
    <div class="modal-overlay" id="clubModal">
        <div class="modal-content" id="clubModalContent"></div>
    </div>

    <script>
        // ==================== TEMA OSCURO ====================
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.className = savedTheme;
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';

        themeToggle.addEventListener('click', () => {
            const newTheme = html.className === 'dark' ? 'light' : 'dark';
            html.className = newTheme;
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        });

        // ==================== MENÚ LATERAL ====================
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuClose = document.getElementById('menuClose');
        const menuBackdrop = document.getElementById('menuBackdrop');
        function openMenu() { menuOverlay.classList.add('open'); menuBackdrop.classList.add('open'); }
        function closeMenu() { menuOverlay.classList.remove('open'); menuBackdrop.classList.remove('open'); }
        menuBtn.addEventListener('click', openMenu);
        menuClose.addEventListener('click', closeMenu);
        menuBackdrop.addEventListener('click', closeMenu);
        document.querySelectorAll('.menu-overlay a').forEach(link => link.addEventListener('click', closeMenu));

        // ==================== DATOS DE CLUBES ====================
        const clubsData = [
            {
                id: '1',
                nombre: 'Comunicación Social y Periodismo',
                descripcion: 'Espacio dedicado al desarrollo de habilidades comunicacionales, periodísticas y de producción audiovisual.',
                emoji: '📰',
                facilitador: {
                    nombre: 'Prof. Robelin Mejías',
                    foto: 'ROBELINMEJIAS.jpeg'
                }
            },
            {
                id: '2',
                nombre: 'Debate',
                descripcion: 'Club de argumentación, oratoria y pensamiento crítico donde se aprende a debatir con respeto y fundamentos.',
                emoji: '🎤',
                facilitador: {
                    nombre: 'Profa. Ana Patricia Sánchez',
                    foto: 'https://placehold.co/100?text=AS'
                }
            },
            {
                id: '3',
                nombre: 'Lectura',
                descripcion: 'Fomento de la lectura crítica y el análisis literario a través de tertulias y talleres.',
                emoji: '📚',
                facilitador: {
                    nombre: 'Prof. Luis Manuel Vargas',
                    foto: 'https://placehold.co/100?text=LV'
                }
            },
            {
                id: '4',
                nombre: 'Arte',
                descripcion: 'Exploración de las artes plásticas, dibujo, pintura y expresión creativa.',
                emoji: '🎨',
                facilitador: {
                    nombre: 'Lic. Carmen Rosa Jiménez',
                    foto: 'https://placehold.co/100?text=CJ'
                }
            },
            {
                id: '5',
                nombre: 'Baile',
                descripcion: 'Danza contemporánea, folclore, ritmos latinos y expresión corporal.',
                emoji: '💃',
                facilitador: {
                    nombre: 'Prof. Pedro Antonio Santos',
                    foto: 'https://placehold.co/100?text=PS'
                }
            },
            {
                id: '6',
                nombre: 'Orientación y Vocación Universitaria',
                descripcion: 'Guía para descubrir intereses profesionales y planificar el futuro académico.',
                emoji: '🎓',
                facilitador: {
                    nombre: 'Dra. Laura Mercedes Fernández',
                    foto: 'https://placehold.co/100?text=LF'
                }
            },
            {
                id: '7',
                nombre: 'Voluntariado y Acción Social',
                descripcion: 'Proyectos solidarios y servicio a la comunidad para generar impacto social positivo.',
                emoji: '🤝',
                facilitador: {
                    nombre: 'Lic. José Miguel Herrera',
                    foto: 'https://placehold.co/100?text=JH'
                }
            }
        ];

        // ==================== RENDERIZAR CLUBES ====================
        function renderClubes() {
            const container = document.getElementById('clubesContainer');
            container.innerHTML = clubsData.map(club => `
                <div class="card">
                    <div class="club-emoji">${club.emoji}</div>
                    <h3>${club.nombre}</h3>
                    <p style="color:var(--text-secondary); margin-bottom:1.5rem;">${club.descripcion}</p>
                    <button class="btn btn-outline" onclick="verClub('${club.id}')">Ver club</button>
                </div>
            `).join('');
        }

        // ==================== MODAL DEL CLUB ====================
        window.verClub = function(id) {
            const club = clubsData.find(c => c.id === id);
            if (!club) return;

            const modal = document.getElementById('clubModal');
            const content = document.getElementById('clubModalContent');
            content.innerHTML = `
                <button class="modal-close" onclick="document.getElementById('clubModal').classList.remove('open')">&times;</button>
                <div style="text-align:center;">
                    <div style="font-size:5rem;">${club.emoji}</div>
                    <h2 style="margin-top:1rem;">${club.nombre}</h2>
                    <p style="color:var(--text-secondary);">${club.descripcion}</p>
                </div>
                <div style="text-align:center; margin:2rem 0;">
                    <img src="${club.facilitador.foto}" alt="${club.facilitador.nombre}" class="facilitador-foto">
                    <p><strong>${club.facilitador.nombre}</strong></p>
                    <p style="color:var(--text-secondary);">Facilitador</p>
                </div>
                <button class="btn btn-gold" style="display:block; margin:0 auto;" onclick="alert('¡Próximamente podrás inscribirte!')">Inscribirme</button>
            `;
            modal.classList.add('open');
        };

        // Cerrar modal al hacer clic fuera
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', function(e) { if (e.target === modal) modal.classList.remove('open'); });
        });

        // Renderizar al cargar
        renderClubes();
    </script>
</body>
</html>
